name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-bundles:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            label: linux-x64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            label: darwin-x64
          - runner: macos-14
            platform: darwin
            arch: arm64
            label: darwin-arm64
          - runner: windows-latest
            platform: windows
            arch: x64
            label: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p relora -p relora-driver-postgres -p relora-driver-mysql -p relora-driver-sqlite

      - name: Package release bundle
        shell: bash
        run: node scripts/package-release-bundle.cjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: relora-${{ matrix.label }}
          path: dist/release-bundles/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-bundles
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-bundles
          pattern: relora-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/release-bundles/*
          generate_release_notes: true

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: build-bundles
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Detect npm token
        id: npm_token
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.npm_token.outputs.present == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.npm_token.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync npm package version to release tag
        if: steps.npm_token.outputs.present == 'true'
        working-directory: packages/relora-npm
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish relora to npm
        if: steps.npm_token.outputs.present == 'true'
        working-directory: packages/relora-npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
